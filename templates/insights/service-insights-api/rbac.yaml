{{- if and .Values.serviceInsightsApi.conversationAnalyzer.enabled .Values.serviceInsightsApi.serviceAccountName }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceInsightsApi.serviceAccountName }}
  namespace: {{ $.Release.Namespace | quote }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-insights-api-jobs-admin
  namespace: {{ $.Release.Namespace | quote }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs", "jobs/status"]
  verbs: ["get", "list", "watch", "create"]
# list+watch required for informer-style polling: the error handler lists all
# pods in the namespace to correlate job pods with their parent Job by label,
# then watches for terminal phase transitions (Failed/Succeeded).
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-insights-api-jobs-admin
  namespace: {{ $.Release.Namespace | quote }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceInsightsApi.serviceAccountName }}
  apiGroup: ""
roleRef:
  kind: Role
  name: service-insights-api-jobs-admin
  apiGroup: rbac.authorization.k8s.io
{{- end }}
