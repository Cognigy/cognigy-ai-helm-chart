{{- if (not .Values.commonSecrets.cognigyInternalMigrationApiKey.existingSecret) }}
  {{- if not (lookup "v1" "Secret" $.Release.Namespace "cognigy-internal-migration-api-key") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cognigy-internal-migration-api-key
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
data:
  api-key: "{{ .Values.commonSecrets.cognigyInternalMigrationApiKey.token | default (printf "%x" (randAlphaNum 128)) | b64enc }}"
  {{- end }}
{{- end }}
