{{- if .Values.llmGateway.enabled -}}
{{- $callers := list "service-ai" "service-api" "service-resources" "service-playbook-execution" -}}
{{- range $caller := $callers -}}
{{- $secretName := printf "cognigy-llm-gateway-caller-%s" $caller -}}
{{- if not (lookup "v1" "Secret" $.Release.Namespace $secretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
data:
  secret: {{ randAlphaNum 64 | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
