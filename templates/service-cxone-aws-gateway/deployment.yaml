{{- if and ($.Values.niceCXOne.enabled) ($.Values.serviceCxoneAwsGateway.enabled) }}
{{- $statefulRabbitMq_secret := include "common.secretName.render" ( dict "existingSecret" $.Values.statefulRabbitMq.auth.existingSecret "defaultSecret" "cognigy-rabbitmq") }}
{{- $redisHa_secret := include "common.secretName.render" ( dict "existingSecret" $.Values.redisHa.auth.existingSecret "defaultSecret" "cognigy-redis-password") }}
{{- $cognigy_cxone_aws_lambda_connection_secrets := include "common.secretName.render" ( dict "existingSecret" $.Values.commonSecrets.niceCXoneAWSLambdaCredentials.existingSecret "defaultSecret" "cognigy-nice-cxone-aws-lambda-credentials") }}
{{- $serviceCxoneAwsGatewayApiSecret_secret := include "common.secretName.render" ( dict "existingSecret" $.Values.commonSecrets.serviceCxoneAwsGatewayApiSecret.existingSecret "defaultSecret" "service-cxone-aws-gateway-api-secret") }}

{{- with .Values.serviceCxoneAwsGateway }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-cxone-aws-gateway
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    owner-team: {{ .ownerTeam }}
  annotations:
    "cognigy.com/source-code": "git@github.com:Cognigy/service-cxone-aws-gateway.git"
spec:
  selector:
    matchLabels:
      app: service-cxone-aws-gateway
  replicas: {{ .replicaCount }}
  template:
    metadata:
      annotations:
        checksum/cognigy-env: {{ include (print $.Template.BasePath "/configurations/cognigy-env.yaml") $ | sha256sum }}
        checksum/rabbitmq: {{ if not (lookup "v1" "Secret" $.Release.Namespace $statefulRabbitMq_secret) }}{{ $statefulRabbitMq_secret | sha256sum }}{{ else }}{{ toYaml (lookup "v1" "Secret" $.Release.Namespace $statefulRabbitMq_secret).data | sha256sum }}{{ end }}
        checksum/redis: {{ if not (lookup "v1" "Secret" $.Release.Namespace $redisHa_secret) }}{{ $redisHa_secret | sha256sum }}{{ else }}{{ toYaml (lookup "v1" "Secret" $.Release.Namespace $redisHa_secret).data | sha256sum }}{{ end }}
        checksum/cognigy-nice-cxone-aws-lambda-credentials: {{ if not (lookup "v1" "Secret" $.Release.Namespace $cognigy_cxone_aws_lambda_connection_secrets) }}{{ $cognigy_cxone_aws_lambda_connection_secrets | sha256sum }}{{ else }}{{ toYaml (lookup "v1" "Secret" $.Release.Namespace $cognigy_cxone_aws_lambda_connection_secrets).data | sha256sum }}{{ end }}
        checksum/service-cxone-aws-gateway-api-secret: {{ if not (lookup "v1" "Secret" $.Release.Namespace $serviceCxoneAwsGatewayApiSecret_secret) }}{{ $serviceCxoneAwsGatewayApiSecret_secret | sha256sum }}{{ else }}{{ toYaml (lookup "v1" "Secret" $.Release.Namespace $serviceCxoneAwsGatewayApiSecret_secret).data | sha256sum }}{{ end }}
        checksum/kinesis-event-queue-mapping: {{ include (print $.Template.BasePath "/service-cxone-aws-gateway/kinesis-event-queue-mapping.yaml") $ | sha256sum }}
        {{- if $.Values.cognigyCommonPodAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" $.Values.cognigyCommonPodAnnotations "context" $) | nindent 8 }}
        {{- end }}
      labels:
        app: service-cxone-aws-gateway
    spec:
      {{- if .serviceAccountName }}
      serviceAccountName: {{ .serviceAccountName }}
      {{- end }}
      {{- if .affinity }}
      affinity: {{- include "common.tplvalues.render" (dict "value" .affinity "context" $) | nindent 8 }}
      {{- end }}
      {{- if .nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" (dict "value" .nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .tolerations "context" $) | nindent 8 }}
      {{- end }}
      {{- if .priorityClassName }}
      priorityClassName: {{ .priorityClassName }}
      {{- end }}
      {{- if and (hasKey $.Values.serviceCxoneAwsGateway "localstack") ($.Values.serviceCxoneAwsGateway.localstack.enabled) (default true $.Values.serviceCxoneAwsGateway.localstack.waitForReady) }}
      initContainers:
        - name: wait-for-localstack
          image: {{ $.Values.serviceCxoneAwsGateway.localstack.image | quote }}
          command: ['sh', '-c']
          args:
            - |
              echo "Waiting for LocalStack to be ready..."
              LOCALSTACK_URL="{{ $.Values.serviceCxoneAwsGateway.localstack.externalEndpoint }}"
              TIMEOUT={{ $.Values.serviceCxoneAwsGateway.localstack.initTimeout | default 300 }}
              ELAPSED=0
              until wget -q -O- ${LOCALSTACK_URL}/_localstack/health | grep -q '"kinesis"'; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "Timeout waiting for LocalStack after ${TIMEOUT}s"
                  exit 1
                fi
                echo "LocalStack not ready yet, waiting... (${ELAPSED}s/${TIMEOUT}s)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "LocalStack is ready!"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      {{- end }}
      containers:
        - name: service-cxone-aws-gateway
          image: {{ include "common.image.render" (dict "global" $.Values.global "image" .image) }}
          resources: {{- toYaml .resources | nindent 12 }}
          ports:
            - name: health
              containerPort: 8001
            - name: metrics
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: cognigy-env
          env:
            - name: REDIS_ENABLE_RECONNECT
              value: "true"
            - name: RABBITMQ_ENABLE_RECONNECT
              value: "true"
            - name: RABBITMQ_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ $statefulRabbitMq_secret }}
                  key: connection-string  
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $redisHa_secret }}
                  key: REDIS_PASSWORD  
            - name: TRACING_ENABLED
              value: {{ $.Values.tracing.sentry.ide.enabled | quote }}
            - name: TRACING_BASE_URL_WITH_PROTOCOL
              value: {{ $.Values.tracing.sentry.ide.baseUrl | quote }}
            - name: TRACING_ERRORS_ENABLED
              value: {{ $.Values.tracing.sentry.ide.errorsEnabled | quote }}
            - name: TRACING_EVENTS_SAMPLE_RATE
              value: {{ $.Values.tracing.sentry.ide.eventsSampleRate | quote }}
            - name: TRACING_SAMPLE_RATE
              value: {{ $.Values.tracing.sentry.ide.sampleRate | quote }}
            - name: ENVIRONMENT
              value: {{ $.Values.tracing.environment | quote }}
            - name: COGNIGY_AI_RELEASE_VERSION
              value: {{ $.Chart.AppVersion | quote }}
            - name: FEATURE_NICE_CXONE_INTEGRATION
              value: {{ $.Values.niceCXOne.enabled | quote }}
            - name: CXONE_BASE_URL
              value: {{ $.Values.niceCXOne.cxoneBaseUrl | quote }}
            - name: NICE_CXONE_AWS_REGION
              value: {{ $.Values.niceCXOne.awsRegion | quote }}
            - name: NICE_CXONE_STACK_PREFIX
              value: {{ $.Values.niceCXOne.stackPrefix | quote }}
            - name: NICE_CXONE_ROLE_SESSION_NAME
              value: {{ $.Values.niceCXOne.roleSessionName | quote }}
            - name: NICE_CXONE_SESSION_DURATION
              value: {{ $.Values.niceCXOne.sessionDuration | quote }}
            - name: NICE_CXONE_ROLE_ARN
              value: {{ $.Values.niceCXOne.roleArn | quote }}
            - name: NICE_CXONE_AWS_ACCOUNT_ID
              value: {{ $.Values.niceCXOne.cxoneAwsAccountId | quote }}
            - name: NICE_CXONE_ASSUME_ROLE_EXTERNAL_ID
              value: {{ $.Values.niceCXOne.cxoneAssumeRoleExternalId | quote }}
            - name: CXONE_AWS_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $serviceCxoneAwsGatewayApiSecret_secret }}
                  key: api-key
            - name: NICE_CXONE_LAMBDA_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $cognigy_cxone_aws_lambda_connection_secrets }}
                  key: nice-cxone-lambda-access-key-id
            - name: NICE_CXONE_LAMBDA_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $cognigy_cxone_aws_lambda_connection_secrets }}
                  key: nice-cxone-lambda-secret-access-key
            {{- if and (hasKey $.Values.serviceCxoneAwsGateway "localstack") $.Values.serviceCxoneAwsGateway.localstack.enabled }}
            - name: LOCALSTACK_ENDPOINT
              value: {{ $.Values.serviceCxoneAwsGateway.localstack.externalEndpoint | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ $.Values.serviceCxoneAwsGateway.localstack.awsAccessKeyId | default "test" | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ $.Values.serviceCxoneAwsGateway.localstack.awsSecretAccessKey | default "test" | quote }}
            {{- end }}
            {{- if .extraEnvVars }}
            {{- include "common.tplvalues.render" (dict "value" .extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: cxone-integration-kinesis-event-queue-mapping
              mountPath: /etc/config/kinesis-event-mapping.json
              subPath: event-mapping.json 
            {{- if .extraVolumeMounts }}
            {{- include "common.tplvalues.render" ( dict "value" .extraVolumeMounts "context" $ ) | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8001
  
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8001
            failureThreshold: 3
            initialDelaySeconds: 90
            periodSeconds: 60
            timeoutSeconds: 10
      volumes:
        - name: cxone-integration-kinesis-event-queue-mapping
          configMap:
            name: cxone-integration-kinesis-event-queue-mapping
            items:
              - key: event-mapping.json
                path: event-mapping.json
        {{- if .extraVolumes }}
        {{- include "common.tplvalues.render" ( dict "value" .extraVolumes "context" $ ) | nindent 8 }}
        {{- end }}
      {{- include "image.pullSecretsCognigy" $ | nindent 6 }}
      securityContext:
        {{- toYaml .securityContext | nindent 8 }}
{{- end }}
{{- end }}