{{- if and (.Values.ingress.enabled) (eq .Values.ingress.ingresController "traefik")}}
{{- range $mfe := (include "mfe.list" $ | fromJson).items }}
{{- if and $mfe.values $mfe.values.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-mfe-{{ $mfe.pathName }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    owner-team: {{ $mfe.team }}
spec:
  stripPrefix:
    prefixes:
      - /microfrontends/{{ $mfe.pathName }}
{{- end }}
{{- end }}
{{- end }}
