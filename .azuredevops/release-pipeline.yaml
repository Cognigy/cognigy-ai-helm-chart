name: $(why)_helm_release_$(SourceBranchName)_$(Date:yyyyMMdd)

trigger:
  batch: true

  # basically never run when we push a branch
  branches:
    exclude:
      - "*"

  # only run when we create new tags
  tags:
    include:
      - "*"

resources:
  repositories:
  - repository: self

  - repository: GitHub
    type: github
    endpoint: github.com_mayrbenjamin92
    name: Cognigy/cognigy-ai-helm-chart
    ref: main

variables:
  # Holds the "Cognigy bypass branch protection" GitHub App credentials used to
  # push to the protected main branch of the public mirror (see the push step).
  - group: github
  - name: azureContainerRegistry
    value: "Azure Container Registry Prod (Federated)"
  - name: chartName
    value: "cognigy.ai"
  - name: ACRName
    value: "cognigy.azurecr.io"
  - name: ACRPath
    value: "helm"
  - ${{ if eq(variables['Build.Reason'], 'Manual') }}:
    - name: why
      value: Manual
  - ${{ else }}:
    - name: why
      value: CD

pool:
  vmImage: ubuntu-24.04

stages:
  - stage: helmChartRelease
    displayName: Create a new release tag and Helm Chart release
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/')
    jobs:
      - job: createOciRelease
        displayName: Publish Helm Chart OCI Fragment
        steps:
          - task: HelmInstaller@0
            displayName: Install Helm 3.8.2
            inputs:
              helmVersion: 3.8.2
              checkLatestHelmVersion: false

          - task: Docker@2
            displayName: Login into container registry
            inputs:
              command: 'login'
              containerRegistry: $(azureContainerRegistry)

          - bash: |
              helm version
              helmChartVersion="$(yq e '.version' Chart.yaml)"
              echo "Helm Chart" $(chartName) "version:" $helmChartVersion
              helm package --dependency-update  . 
              helm push ./$(chartName)-$helmChartVersion.tgz oci://$(ACRName)/$(ACRPath)
      - job: createGithubRelease
        displayName: Publish Helm Chart Github repo
        steps:
          - task: HelmInstaller@0
            displayName: Install Helm 3.8.2
            inputs:
              helmVersion: 3.8.2
              checkLatestHelmVersion: false

          - checkout: self
            persistCredentials: "true"
            clean: "true"
            displayName: Checkout Helm Chart Source Repo

          - checkout: GitHub
            persistCredentials: "true"
            clean: "true"
            displayName: Checkout Helm Chart Target Repo

          - script: |
              # Fail the job on any error or unset variable. Without this the
              # script kept exit code 0 even when `git push origin main` was
              # rejected (e.g. by the GitHub branch-protection ruleset), because
              # the subsequent tag push succeeded and masked the failure. The
              # result was a mirror whose tags advanced while `main` went stale.
              set -euo pipefail

              # --- Mint a short-lived installation token for the "Cognigy bypass
              # --- branch protection" GitHub App. The org ruleset on the mirror
              # --- requires a PR for main; this app is a bypass actor on that
              # --- ruleset, so pushing as the app is allowed. This replaces the
              # --- personal-PAT auth that the ruleset now rejects.
              b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
              now="$(date +%s)"
              header="$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)"
              payload="$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' "$((now - 60))" "$((now + 540))" "$BYPASS_APP_ID" | b64url)"
              unsigned="${header}.${payload}"
              keyfile="$(mktemp)"
              printf '%s' "$BYPASS_APP_PRIVATE_KEY" > "$keyfile"
              signature="$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$keyfile" | b64url)"
              rm -f "$keyfile"
              jwt="${unsigned}.${signature}"

              installationToken="$(curl -sf -X POST \
                -H "Authorization: Bearer $jwt" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/app/installations/${BYPASS_APP_INSTALLATION_ID}/access_tokens" \
                | jq -r '.token')"

              if [ -z "$installationToken" ] || [ "$installationToken" = "null" ]; then
                echo "Failed to obtain GitHub App installation token"; exit 1
              fi
              # Mask the token so it is never printed in the build logs.
              echo "##vso[task.setvariable variable=installationToken;issecret=true]$installationToken"

              git config --global user.email "azure-pipeline@cognigy.com"
              git config --global user.name "Azure Pipelines Bot"

              cd cognigy-ai-helm-chart
              rm -fr ./*
              cd ..

              cd cognigy-ai-app
              helmChartVersion="$(yq e '.version' Chart.yaml)"

              echo "Helm Chart version is $helmChartVersion"

              rm -fr .git
              rm -fr CHANGELOG
              cp -r ./ ../cognigy-ai-helm-chart

              cd ../cognigy-ai-helm-chart
              git checkout main
              git add -A

              if git diff --cached --quiet; then
                echo "No file changes for $helmChartVersion; skipping commit."
              else
                git commit -m "Adding files for Helm Chart $helmChartVersion"
              fi

              git tag "v$helmChartVersion"

              # Authenticate the push as the bypass GitHub App.
              git remote set-url origin "https://x-access-token:${installationToken}@github.com/Cognigy/cognigy-ai-helm-chart.git"

              # Push main first so a rejected push fails the pipeline loudly
              # before the tag push can hide it.
              echo "Pushing main to GitHub mirror..."
              git push origin main

              echo "Pushing tag v$helmChartVersion to GitHub mirror..."
              git push origin "tags/v$helmChartVersion"
            env:
              BYPASS_APP_ID: $(BYPASS_BRANCH_PROTECTION_APP_ID)
              BYPASS_APP_INSTALLATION_ID: $(BYPASS_BRANCH_PROTECTION_INSTALLATION_ID)
              BYPASS_APP_PRIVATE_KEY: $(BYPASS_BRANCH_PROTECTION_PRIVATE_KEY)